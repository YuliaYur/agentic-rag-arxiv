# Eval-regression gate: run the eval on every PR and FAIL the build if the agent's
# key metrics drop below the committed floors in eval/thresholds.json.
#
# Cost is bounded deliberately (see eval/README.md > CI gate):
#   * 6-question `seed` subset, agent-only (the shipped system) — not the full set
#     or both systems;
#   * cheap, configurable judge model (LLM_MODEL);
#   * a FROZEN index fixture (eval/fixtures/index.jsonl.gz) loaded into a Qdrant
#     service container — no arXiv fetch, no PDF parsing, no ingest, no GPU;
#   * cached HuggingFace models + pip; CPU-only torch; paths filter; concurrency
#     cancel-in-progress.
# On a fork PR (no OPENAI_API_KEY secret) it degrades to a free retrieval-only gate.

name: eval-gate

on:
  pull_request:
    paths:
      - "src/**"
      - "eval/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/eval-gate.yml"
  workflow_dispatch:

concurrency:
  group: eval-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      qdrant:
        image: qdrant/qdrant:v1.12.4
        ports:
          - 6333:6333
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LLM_MODEL: gpt-4o-mini            # judge/metric model — the cheap-model lever
      KMP_DUPLICATE_LIB_OK: "TRUE"
      OMP_NUM_THREADS: "1"
      TOKENIZERS_PARALLELISM: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-bge-small-minilm-v1

      - name: Install CPU-only PyTorch
        # The default linux torch wheel is the multi-GB CUDA build; pin the small
        # CPU wheel so install stays fast and disk-light.
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6333/readyz >/dev/null; then echo "Qdrant ready"; exit 0; fi
            sleep 2
          done
          echo "Qdrant did not become ready" >&2; exit 1

      - name: Load frozen index fixture
        run: python scripts/load_index_fixture.py

      - name: Run eval (seed subset, agent-only)
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            python scripts/eval_run.py --status seed --systems agent
          else
            echo "::warning::No OPENAI_API_KEY (fork PR?) — running the free retrieval-only gate."
            python scripts/eval_run.py --status seed --systems agent --no-ragas --no-judge
          fi

      - name: Gate on thresholds
        run: |
          set +e
          python scripts/eval_gate.py eval/results/latest.json eval/thresholds.json --summary eval_gate_summary.md
          rc=$?
          cat eval_gate_summary.md >> "$GITHUB_STEP_SUMMARY"
          exit $rc

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval/results/
          retention-days: 14

      - name: Comment results on the PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Eval gate\n_(no summary produced — the eval step likely failed before gating; see the logs.)_';
            try { body = fs.readFileSync('eval_gate_summary.md', 'utf8'); } catch (e) {}
            const marker = '<!-- eval-gate-comment -->';
            body = `${marker}\n${body}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
