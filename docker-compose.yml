# Local infra for the RAG stack.
#   docker compose up -d        # start Qdrant + Langfuse (data persists in ./data)
#   docker compose down         # stop
#
# Qdrant dashboard:  http://localhost:6333/dashboard
# Langfuse UI:       http://localhost:3000   (login: dev@example.com / localdevpassword)
#
# Langfuse is the self-hosted v2 stack (one server + Postgres) — light enough to run
# locally. A project and API keys are auto-provisioned on first boot via the
# LANGFUSE_INIT_* vars below, so the keys in .env.example work out of the box.
# These are LOCAL-DEV credentials — rotate them for any non-local use.
services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: agentic-rag-qdrant
    ports:
      - "6333:6333"   # REST + dashboard
      - "6334:6334"   # gRPC
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  # Backend for the LiteLLM semantic cache. redis-stack-server bundles RediSearch,
  # which LiteLLM's `redis-semantic` cache needs for vector similarity search.
  redis:
    image: redis/redis-stack-server:7.4.0-v0
    container_name: agentic-rag-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped

  langfuse-db:
    image: postgres:16
    container_name: agentic-rag-langfuse-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: langfuse
    volumes:
      - ./data/langfuse-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    container_name: agentic-rag-langfuse
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      # Local-dev secrets — do NOT use these values anywhere real.
      NEXTAUTH_SECRET: local-dev-not-a-secret-change-me
      SALT: local-dev-salt-change-me
      # Must be quoted: a bare hex/number string is otherwise parsed as a YAML
      # number. 64 hex chars (256-bit); regenerate with `openssl rand -hex 32`.
      ENCRYPTION_KEY: "a1b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f90"
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: local
      LANGFUSE_INIT_ORG_NAME: Local
      LANGFUSE_INIT_PROJECT_ID: agentic-rag
      LANGFUSE_INIT_PROJECT_NAME: agentic-rag-arxiv
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-local-dev
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-local-dev
      LANGFUSE_INIT_USER_EMAIL: dev@example.com
      LANGFUSE_INIT_USER_NAME: dev
      LANGFUSE_INIT_USER_PASSWORD: localdevpassword
    restart: unless-stopped
